<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民陳情案「簽、函稿」自動生成器</title>
    <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #1a365d; border-bottom: 2px solid #2b6cb0; padding-bottom: 10px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; color: #2d3748; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
    .required::after { content: " *"; color: #e53e3e; }
    .btn-group { margin-top: 25px; display: flex; gap: 15px; }
    .api-status-box { text-align: center; margin: 20px 0; padding: 10px; background: #edf2f7; border-radius: 4px; font-size: 14px; }
    button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-sign-draft { background-color: #2b6cb0; }
    .btn-replace { background-color: #319795; }
    .output-section { margin-top: 30px; display: none; }
    .document-box { background: #fff; border: 2px solid #333; padding: 40px; margin-bottom: 30px; font-family: "標楷體", serif; font-size: 18px; line-height: 1.8; white-space: pre-wrap; }
    .doc-title { text-align: center; font-size: 26px; font-weight: bold; margin-bottom: 30px; }
    .ai-badge { background-color: #ebf8ff; color: #2b6cb0; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽、函稿」生成器</h2>
    
    <!-- 金鑰設定區塊 -->
    <div id="statusContainer" class="api-status-box"></div>

    <div class="form-group">
        <label for="petitioner">陳情人</label>
        <input type="text" id="petitioner" placeholder="請輸入姓名">
    </div>
    <div class="form-group">
        <label for="incomingDate">來文時間</label>
        <input type="date" id="incomingDate">
    </div>
    <div class="form-group">
        <label for="content" class="required">陳情內容</label>
        <textarea id="content" placeholder="請輸入內容..."></textarea>
    </div>
    <div class="form-group">
        <label for="summary">回覆大要</label>
        <textarea id="summary" placeholder="留空由 AI 自行生成..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-sign-draft" onclick="generateDoc('併陳')">📝 簽稿併陳</button>
        <button class="btn-replace" onclick="generateDoc('代簽')">🚀 以稿代簽</button>
    </div>

    <div id="outputSection" class="output-section">
        <div id="aiNotify" class="ai-badge"></div>
        <div id="documentContainer"></div>
    </div>
</div>

<script>
    // 統一初始化邏輯
    window.onload = function() {
        const today = new Date();
        document.getElementById('incomingDate').value = today.toISOString().split('T')[0];
        updateStatusDisplay();
    };

    function updateStatusDisplay() {
        const key = localStorage.getItem('gemini_api_key');
        const statusContainer = document.getElementById('statusContainer');
        statusContainer.innerHTML = key ? 
            "✅ API 金鑰已設定 <button onclick='updateApiKey()'>修改</button>" : 
            "⚠️ 尚未設定 API 金鑰 <button onclick='updateApiKey()'>立即設定</button>";
    }

    function updateApiKey() {
        const newKey = prompt("請輸入您的 Google Gemini API 金鑰 (AIzaSy 開頭)：");
        if (newKey) {
            localStorage.setItem('gemini_api_key', newKey.trim());
            updateStatusDisplay();
        }
    }

    function formatChineseDate(dateString) {
        const date = new Date(dateString);
        return `中華民國 ${date.getFullYear() - 1911} 年 ${date.getMonth() + 1} 月 ${date.getDate()} 日`;
    }

    // 【修改處 1】加入 type 參數，優化 Prompt 讓 AI 能精準產出簽與稿
    async function simulateGeminiAI(type, petitioner, dateStr, content, summary) {
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) throw new Error("請先點擊上方按鈕設定 API 金鑰。");

        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        let promptText = `你現在是台灣的公務員，請依據《行政院文書處理手冊》規範，針對以下陳情內容擬具公文。\n`;
        promptText += `陳情人：${petitioner || '民眾'}\n`;
        promptText += `來文日期：${dateStr}\n`;
        promptText += `陳情內容：${content}\n`;
        if (summary) promptText += `擬辦擬復重點：${summary}\n\n`;

        if (type === '併陳') {
            promptText += `請生成「簽」與「函（稿）」兩部分，並用【簽】與【函稿】標籤分開。
格式要求：
【簽】
主旨：
說明：一、... 二、...
擬辦：一、... 二、...

【函稿】
主旨：
說明：一、... 二、...`;
        } else {
            promptText += `請生成「以稿代簽」的「函（稿）」。
格式要求：
【函稿】
主旨：（請在主旨最後面或適當處加上「，請核示。」或依以稿代簽習慣擬具）
說明：一、... 二、...`;
        }

        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: promptText }] }] })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
    }

    // 【修改處 2】根據 type 渲染不同的 HTML 區塊
    async function generateDoc(type) {
        const content = document.getElementById('content').value;
        const petitioner = document.getElementById('petitioner').value;
        const summary = document.getElementById('summary').value;
        if (!content) return alert("請填寫內容");

        try {
            const dateStr = formatChineseDate(document.getElementById('incomingDate').value);
            
            // 呼叫 AI（傳入 type 與相關參數）
            const aiText = await simulateGeminiAI(type, petitioner, dateStr, content, summary);
            
            document.getElementById('aiNotify').innerHTML = `✅ ${type} 模擬生成成功`;
            document.getElementById('outputSection').style.display = 'block';
            
            let html = "";
            
            if (type === '併陳') {
                // 如果是簽稿併陳，嘗試拆分 AI 的回傳結果
                let signText = "（未生成簽）";
                let draftText = "（未生成函稿）";
                
                if (aiText.includes('【簽】') && aiText.includes('【函稿】')) {
                    const parts = aiText.split('【函稿】');
                    signText = parts[0].replace('【簽】', '').trim();
                    draftText = parts[1].trim();
                } else {
                    // 若 AI 沒有乖乖用標籤，就直接顯示整段
                    signText = aiText;
                }
                
                html = `
                    <div class="doc-title">【 簽 】</div>
                    <div class="document-box">${signText}</div>
                    <br>
                    <div class="doc-title">【 函 稿 】</div>
                    <div class="document-box">${draftText}</div>
                `;
            } else {
                // 如果是以稿代簽，只顯示函稿
                let draftText = aiText.replace('【函稿】', '').trim();
                html = `
                    <div class="doc-title">【 函 稿 （以稿代簽）】</div>
                    <div class="document-box">${draftText}</div>
                `;
            }
            
            document.getElementById('documentContainer').innerHTML = html;
        } catch (e) {
            alert("生成失敗: " + e.message);
        }
    }
</script>
</body>
</html>

<script>
(function() {
    // === 【請在此處修改您的設定】 ===
    // 請將您發布到網路的 Google 試算表 CSV 網址填入下方雙引號中：
    const GOOGLE_CSV_URL = "請將你發布到網路的CSV網址貼在這裡"; 
    const MATCH_THRESHOLD = 0.25; // 相似度門檻 (0~1)，數字愈低愈寬鬆，數字愈高愈嚴格
    // ====================================

    // 在原有的「回覆大要」下方，動態插入提示區塊，完全不干擾原 HTML 結構
    const summaryGroup = document.getElementById('summary').parentNode;
    const searchAlertBox = document.createElement('div');
    searchAlertBox.id = 'historyAlertBox';
    searchAlertBox.style.cssText = "margin-top: 10px; padding: 12px; background: #fffaf0; border: 1px dashed #dd6b20; border-radius: 4px; font-size: 14px; color: #dd6b20; display: none;";
    summaryGroup.appendChild(searchAlertBox);

    // 監聽陳情內容輸入框，當滑鼠點擊外面（離開焦點）時自動觸發比對
    const contentInput = document.getElementById('content');
    contentInput.addEventListener('blur', searchHistoryCase);

    // 字詞重疊率相似度算法，適合中文比對
    function calculateSimilarity(str1, str2) {
        if (!str1 || !str2) return 0;
        const set1 = new Set(str1.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ''));
        const set2 = new Set(str2.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ''));
        if (set1.size === 0 || set2.size === 0) return 0;
        
        let intersection = 0;
        for (let char of set1) {
            if (set2.has(char)) intersection++;
        }
        return intersection / set1.size;
    }

    // 解析 CSV 文字的工具（防呆處理換行與包含引號的儲存格）
    function parseCSV(text) {
        const lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') lines.push(row);
        return lines;
    }

    // 主要比對邏輯
    async function searchHistoryCase() {
        const currentContent = contentInput.value.trim();
        const alertBox = document.getElementById('historyAlertBox');
        if (currentContent.length < 5) return; // 字數太少則不啟動比對

        if (GOOGLE_CSV_URL === "請將你發布到網路的CSV網址貼在這裡") {
            console.warn("尚未設定 Google 表單 CSV 網址，無法啟動歷史案件比對。");
            return;
        }

        try {
            alertBox.style.display = 'block';
            alertBox.innerHTML = "🔍 正在即時比對 Google 表單協作資料庫...";
            
            const response = await fetch(GOOGLE_CSV_URL);
            const csvText = await response.text();
            const rows = parseCSV(csvText);

            // 自動偵測欄位標頭
            const header = rows[0];
            let contentIdx = header.findIndex(h => h.includes('陳情'));
            let replyIdx = header.findIndex(h => h.includes('回覆') || h.includes('答覆') || h.includes('辦理結果'));

            // 預設防呆：若找不到標頭關鍵字，預設為第 2 欄與第 3 欄
            if (contentIdx === -1) contentIdx = 2;
            if (replyIdx === -1) replyIdx = 3;

            let bestMatch = null;
            let highestScore = 0;

            // 逐列比對協作資料
            for (let i = 1; i < rows.length; i++) {
                const historyContent = rows[i][contentIdx];
                const historyReply = rows[i][replyIdx];
                if (!historyContent || !historyReply) continue;

                const score = calculateSimilarity(currentContent, historyContent);
                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = { content: historyContent, reply: historyReply };
                }
            }

            // 達到門檻則跳出提示
            if (highestScore >= MATCH_THRESHOLD && bestMatch) {
                alertBox.innerHTML = `
                    <strong>💡 偵測到意思相近的歷史案件（相似度: ${Math.round(highestScore * 100)}%）</strong><br>
                    <div style="margin: 5px 0; color: #555; background: #fff; padding: 5px; border-radius: 3px; max-height: 80px; overflow-y: auto;">
                        <strong>歷陳：</strong>${bestMatch.content}<br>
                        <strong>歷復：</strong>${bestMatch.reply}
                    </div>
                    <button type="button" id='btnApplyHistory' style="margin-top:5px; padding:4px 8px; font-size:12px; background:#dd6b20; color:#fff; border:none; border-radius:3px; cursor:pointer;">
                        📥 引用此歷史回覆並請 Gemini 潤飾
                    </button>
                `;
                
                // 點擊引用按鈕
                document.getElementById('btnApplyHistory').onclick = function() {
                    document.getElementById('summary').value = `【請參考並潤飾以下歷史回覆內容】：${bestMatch.reply}`;
                    alertBox.innerHTML = "✅ 已成功引用協作內容！請點擊下方的「簽稿併陳」或「以稿代簽」開始潤飾。";
                    alertBox.style.background = "#f0fff4";
                    alertBox.style.borderColor = "#38a169";
                    alertBox.style.color = "#276749";
                };
            } else {
                alertBox.style.display = 'none'; // 沒找到相似案則隱藏
            }

        } catch (e) {
            console.error("歷史資料庫讀取失敗:", e);
            alertBox.innerHTML = "⚠️ 無法連線至 Google 協作資料庫，將採取常規 AI 生成。";
        }
    }

    // 攔截並強化 Prompt：當發現有引用標記時，自動要求 Gemini 對該歷史內文進行潤飾防死抄
    const originalSimulateGeminiAI = window.simulateGeminiAI;
    window.simulateGeminiAI = async function(type, petitioner, dateStr, content, summary) {
        let enhancedSummary = summary;
        if (summary && summary.includes('【請參考並潤飾以下歷史回覆內容】')) {
            enhancedSummary = summary + `\n⚠️ 提示：此歷史回覆為同仁協作累積的精準答覆。請提煉該歷史回覆的核心法規或處置重點，並根據這次新案件的脈絡重新潤飾語氣，包裝成正式公文格式，請勿盲目全抄。`;
        }
        return await originalSimulateGeminiAI(type, petitioner, dateStr, content, enhancedSummary);
    };
})();
</script>
