<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>人民陳情案「簽與函稿」AI 智慧生成器 v4.0</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f5f7fa; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 15px; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
        label .optional { font-size: 0.85em; color: #7f8c8d; font-weight: normal; }
        label .required { font-size: 0.85em; color: #e74c3c; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; }
        
        /* 辦理方式切換鍵樣式 */
        .mode-container { display: flex; justify-content: center; margin: 20px 0; background: #eee; padding: 5px; border-radius: 25px; }
        .mode-btn { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 20px; font-weight: bold; color: #555; transition: 0.3s; }
        .mode-btn.active { background-color: #2c3e50; color: #fff; }
        
        .btn-container { text-align: center; margin-top: 25px; }
        .submit-btn { padding: 14px 40px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .submit-btn:hover { background-color: #3498db; }
        
        /* 輸出結果樣式 */
        .output-section { margin-top: 30px; display: none; }
        .output-box { padding: 20px; border: 1px dashed #2980b9; background: #fdfefe; white-space: pre-wrap; margin-bottom: 25px; font-size: 15px; border-radius: 4px; line-height: 1.8; }
        .output-title { font-weight: bold; color: #2c3e50; margin-bottom: 8px; font-size: 1.1em; display: flex; align-items: center; }
        .ai-badge { background-color: #e2f0d9; color: #385723; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: normal; margin-left: 10px; border: 1px solid #385723; }
        .loading { display: none; text-align: center; color: #2980b9; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽與函稿」AI 智慧生成器</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label for="petitioner">1. 陳情人 <span class="optional">（選填，預設為「陳情人」）</span>：</label>
            <input type="text" id="petitioner" placeholder="例：張先生">
        </div>

        <div class="form-group">
            <label for="receiveDate">2. 來文時間 <span class="optional">（選填，預設為今日）</span>：</label>
            <input type="date" id="receiveDate">
        </div>
    </div>

    <div class="form-group">
        <label for="content">3. 陳情內容 <span class="required">（必填）</span>：</label>
        <textarea id="content" rows="4" placeholder="請輸入民眾陳情之核心具體訴求..."></textarea>
    </div>

    <div class="form-group">
        <label for="summary">4. 回覆大要/擬答重點 <span class="optional">（選填，留空或簡寫都會觸發 Gemini AI 優化）</span>：</label>
        <textarea id="summary" rows="4" placeholder="可留空由 AI 發揮；或簡要填寫關鍵字（例：不符規定拒絕），由 AI 自動擴充撰寫為正式公文語氣。"></textarea>
    </div>

    <label>5. 請選擇公文辦理方式：</label>
    <div class="mode-container">
        <div class="mode-btn active" id="btnBoth" onclick="changeMode('both')">簽稿併陳</div>
        <div class="mode-btn" id="idDraftOnly" onclick="changeMode('draftOnly')">以稿代簽</div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="submitBtn" onclick="startGeneration()">一鍵生成公文稿件</button>
    </div>
    
    <div class="loading" id="loadingText">⏳ Gemini AI 正在運用專業公文語氣研議並優化回覆內容，請稍候...</div>

    <div id="outputSection" class="output-section">
        <div id="signBlock">
            <div class="output-title">【簽呈範本】<span id="aiSignBadge"></span></div>
            <div id="signOutput" class="output-box"></div>
        </div>
        <div class="output-title">【函稿範本】<span id="aiLetterBadge"></span></div>
        <div id="letterOutput" class="output-box"></div>
    </div>
</div>

<script>
    // ⚠️ 請在此處填入您的 Gemini API Key 以啟用完整 AI 功能！
    const GEMINI_API_KEY = "請在此處填入您的Gemini_API_KEY"; 
    
    let currentMode = 'both'; // 預設模式

    // 自動將「來文時間」欄位預設為今天
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('receiveDate').value = today;
    };

    // 切換模式的函式
    function changeMode(mode) {
        currentMode = mode;
        if (mode === 'both') {
            document.getElementById('btnBoth').classList.add('active');
            document.getElementById('idDraftOnly').classList.remove('active');
        } else {
            document.getElementById('idDraftOnly').classList.add('active');
            document.getElementById('btnBoth').classList.remove('active');
        }
    }

    // 按下生成的按鈕主程式
    async function startGeneration() {
        let petitioner = document.getElementById('petitioner').value.trim() || "陳情人";
        let content = document.getElementById('content').value.trim();
        let summary = document.getElementById('summary').value.trim();
        let receiveDateRaw = document.getElementById('receiveDate').value;
        
        // 轉換為民國日期格式
        let dateString = "____年__月__日";
        if (receiveDateRaw) {
            const dateParts = receiveDateRaw.split('-');
            const year = parseInt(dateParts[0]) - 1911;
            const month = parseInt(dateParts[1]);
            const day = parseInt(dateParts[2]);
            dateString = `民國 ${year} 年 ${month} 月 ${day} 日`;
        }

        // 1. 驗證必填
        if (!content) { 
            alert("請輸入「陳情內容」！"); 
            document.getElementById('content').focus();
            return; 
        }

        let isAiUsed = false;
        let finalSummary = summary;

        // 2. 檢查 API 金鑰並決定是否跑 AI
        if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("請在此處填入") || GEMINI_API_KEY === "") {
            // 如果沒貼 Key，而且 summary 又是空的，直接給預設保留文字
            if (!finalSummary) {
                finalSummary = "（回覆大要留空，請於此處手動補充回覆大要與法規依據）";
            }
        } else {
            // 有貼 Key，啟動 AI
            isAiUsed = true;
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('outputSection').style.display = 'none';
            
            try {
                finalSummary = await callGemini(content, summary);
            } catch (e) {
                console.error(e);
                finalSummary = summary || "（AI 連線失敗，請手動補充回覆大要）";
                isAiUsed = false;
            }
            
            document.getElementById('loadingText').style.display = 'none';
        }

        // 3. 設定 AI 標籤
        const badgeHtml = isAiUsed ? '<span class="ai-badge">Gemini AI 智慧擬答</span>' : '';
        document.getElementById('aiSignBadge').innerHTML = badgeHtml;
        document.getElementById('aiLetterBadge').innerHTML = badgeHtml;

        // 4. 依照模式輸出結果
        const signBlock = document.getElementById('signBlock');
        const signOutput = document.getElementById('signOutput');
        const letterOutput = document.getElementById('letterOutput');

        if (currentMode === 'both') {
            signBlock.style.display = 'block';
            signOutput.textContent = `主旨：關於 ${petitioner} 於 ${dateString} 陳情案，擬辦意見如說明，請 核示。\n\n說明：\n一、依據 ${petitioner} ${dateString} 陳情意見辦理。\n二、本案陳情核心內容略以：\n    ${content}\n三、經查與研議，本案擬擬答復要點如下：\n    ${finalSummary}\n四、檢陳回覆函稿乙份。\n\n擬辦：奉核後，稿隨文發。`;
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端於 ${dateString} 陳情事項，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${finalSummary}`;
        } else {
            signBlock.style.display = 'none';
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端於 ${dateString} 陳情事項，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${finalSummary}\n\n正本：${petitioner}\n副本：\n\n（本案依規定採「以稿代簽」辦理，經 貴長官核可後逕行發文）`;
        }

        // 5. 打開輸出區塊並向下捲動
        document.getElementById('outputSection').style.display = 'block';
        document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
    }

    // 負責處理 Gemini API 連線
    async function callGemini(content, userSummary) {
        let promptText = `你現在是台灣政府機關的公文專家。現有民眾陳情內容如下：\n「${content}」\n\n`;
        if (userSummary) {
            promptText += `承辦人員對此案已提供初步擬答方向或關鍵字：\n「${userSummary}」\n\n請依據承辦人的擬答方向，將其「優化、擴充並潤飾」為一段長度約150-300字、語氣正式、客觀、委婉且依法行政的公文說明文字。`;
        } else {
            promptText += `承辦人員目前尚未提供擬答方向。請你站在政府機關的客觀立場，直接「從無到有」為此陳情內容撰寫一段長度約150-300字、語氣正式、公務專業的回覆要點。`;
        }
        promptText += `\n\n【嚴格限制要求】：\n1. 必須以公務機關正式說明的語氣撰寫，多使用「經查…」、「按規定…」、「尚難照辦」、「尚請見諒」等公文慣用語。\n2. 直接輸出回覆內容，絕對不要包含公文的「主旨：」、「說明：」等外殼結構，只要提供要點文字即可。\n3. 不要寫任何前言、引言或贅詞。`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        if (!response.ok) throw new Error("API Error");
        const data = await response.json();
        return data.candidates[0].content.parts[0].text.trim();
    }
</script>
</body>
</html>
