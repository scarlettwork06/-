<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民陳情案「簽、函稿」自動生成器</title>
    <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #1a365d; border-bottom: 2px solid #2b6cb0; padding-bottom: 10px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; color: #2d3748; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
    .required::after { content: " *"; color: #e53e3e; }
    .btn-group { margin-top: 25px; display: flex; gap: 15px; }
    .api-status-box { text-align: center; margin: 20px 0; padding: 10px; background: #edf2f7; border-radius: 4px; font-size: 14px; }
    button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-sign-draft { background-color: #2b6cb0; }
    .btn-replace { background-color: #319795; }
    .output-section { margin-top: 30px; display: none; }
    .document-box { background: #fff; border: 2px solid #333; padding: 40px; margin-bottom: 30px; font-family: "標楷體", serif; font-size: 18px; line-height: 1.8; white-space: pre-wrap; }
    .doc-title { text-align: center; font-size: 26px; font-weight: bold; margin-bottom: 30px; }
    .ai-badge { background-color: #ebf8ff; color: #2b6cb0; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽、函稿」生成器</h2>
    
    <!-- 金鑰設定區塊 -->
    <div id="statusContainer" class="api-status-box"></div>

    <div class="form-group">
        <label for="petitioner">陳情人</label>
        <input type="text" id="petitioner" placeholder="請輸入姓名">
    </div>
    <div class="form-group">
        <label for="incomingDate">來文時間</label>
        <input type="date" id="incomingDate">
    </div>
    <div class="form-group">
        <label for="content" class="required">陳情內容</label>
        <textarea id="content" placeholder="請輸入內容..."></textarea>
    </div>
    <div class="form-group">
        <label for="summary">回覆大要</label>
        <textarea id="summary" rows="20" placeholder="留空由 AI 自行生成..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-sign-draft" onclick="generateDoc('併陳')">📝 簽稿併陳</button>
        <button class="btn-replace" onclick="generateDoc('代簽')">🚀 以稿代簽</button>
    </div>

    <div id="outputSection" class="output-section">
        <div id="aiNotify" class="ai-badge"></div>
        <div id="documentContainer"></div>
    </div>
</div>

<script>
    // 統一初始化邏輯
    window.onload = function() {
        const today = new Date();
        document.getElementById('incomingDate').value = today.toISOString().split('T')[0];
        updateStatusDisplay();
    };

    function updateStatusDisplay() {
        const key = localStorage.getItem('gemini_api_key');
        const statusContainer = document.getElementById('statusContainer');
        statusContainer.innerHTML = key ? 
            "✅ API 金鑰已設定 <button onclick='updateApiKey()'>修改</button>" : 
            "⚠️ 尚未設定 API 金鑰 <button onclick='updateApiKey()'>立即設定</button>";
    }

    function updateApiKey() {
        const newKey = prompt("請輸入您的 Google Gemini API 金鑰 (AIzaSy 開頭)：");
        if (newKey) {
            localStorage.setItem('gemini_api_key', newKey.trim());
            updateStatusDisplay();
        }
    }

    function formatChineseDate(dateString) {
        const date = new Date(dateString);
        return `中華民國 ${date.getFullYear() - 1911} 年 ${date.getMonth() + 1} 月 ${date.getDate()} 日`;
    }

    // 【修改處 1】加入 type 參數，優化 Prompt 讓 AI 能精準產出簽與稿
    // 【優化 Prompt】對接全國法規資料庫標準與行政院文書處理手冊
   // 【優化 Prompt】對接全國法規資料庫、文書手冊，並將回覆大要提升為對 Gemini 的直接核心指令
    async function simulateGeminiAI(type, petitioner, dateStr, content, summary) {
        const API_KEY = localStorage.getItem('gemini_api_key');
        if (!API_KEY) throw new Error("請先點擊上方按鈕設定 API 金鑰。");

        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        let promptText = `【身份與任務】
你現在是台灣最高行政機關的資深公務員，請嚴格遵循以下兩大國家標準，針對人民陳情案件擬具正式公文：

1. ⚖️【法源依據：全國法規資料庫標準】
   - 公文中提及之所有中央法規、地方法規、組織法、處分依據（如：訴願法、行政程序法、個人資料保護法、法官法、檢察官評鑑實施辦法等），必須完全符合中華民國「全國法規資料庫」中「現行有效」之法律條文內容與條號。
   - 嚴禁憑空編造法條條號或內容。引述法規時，格式必須精準（例如：「依據《XXXX法》第O條第O項規定...」）。
   - 若陳情內容涉及特定救濟、評鑑、申訴管道，請務必點出正確的權責主管機關。

2. 📝【格式規範：行政院文書處理手冊最新標準】
   - 結構必須符合「主旨」、「說明」、「擬辦」之公文標準架構。
   - 項目符號請嚴格依序使用：一、 (一) 1. (1)。
   - 文字語氣必須：客觀、專業、嚴謹、平實、肯定，避免情緒性或多餘的文學修飾。

【陳情案基本資訊】
- 陳情人：${petitioner || '民眾'}
- 來文日期：${dateStr}
- 陳情內容：${content}

`;

        // 核心改動：若「回覆大要」有文字，將其提升為與 AI 溝通的最高核心指令
        if (summary) {
            promptText += `【🚨 核心擬辦與對 AI 的直接變更指令（最高優先權）】
承辦人已在「回覆大要」欄位輸入了具體指示或參考前案。
請你將以下文字視為與你溝通的直接命令，並完全依照其要求來編排、潤飾、補充或調整公文內容與語氣：
--------------------------------------
${summary}
--------------------------------------\n\n`;
        }

        promptText += `【輸出格式要求】\n`;

        if (type === '併陳') {
            promptText += `請生成「簽」與「函（稿）」兩部分，並用【簽】與【函稿】標籤分開。

【簽】
主旨：
說明：一、... 二、...
擬辦：一、......（請依權責提出明確具體之處置建議，落實行政院公文效率要求）

【函稿】
受文者：${petitioner || '民眾'}
主旨：
說明：一、... 二、...`;
        } else {
            promptText += `請生成「以稿代簽」的「函（稿）」。

【函稿】
受文者：${petitioner || '民眾'}
主旨：（請依據以稿代簽之公文習慣，於主旨末端加上「，請核示。」，並確保主旨一句話交代完畢）
說明：一、... 二、...`;
        }

        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: promptText }] }] })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
    }

    // 【修改處 2】根據 type 渲染不同的 HTML 區塊
    async function generateDoc(type) {
        const content = document.getElementById('content').value;
        const petitioner = document.getElementById('petitioner').value;
        const summary = document.getElementById('summary').value;
        if (!content) return alert("請填寫內容");

        try {
            const dateStr = formatChineseDate(document.getElementById('incomingDate').value);
            
            // 呼叫 AI（傳入 type 與相關參數）
            const aiText = await simulateGeminiAI(type, petitioner, dateStr, content, summary);
            
            document.getElementById('aiNotify').innerHTML = `✅ ${type} 模擬生成成功`;
            document.getElementById('outputSection').style.display = 'block';
            
            let html = "";
            
            if (type === '併陳') {
                // 如果是簽稿併陳，嘗試拆分 AI 的回傳結果
                let signText = "（未生成簽）";
                let draftText = "（未生成函稿）";
                
                if (aiText.includes('【簽】') && aiText.includes('【函稿】')) {
                    const parts = aiText.split('【函稿】');
                    signText = parts[0].replace('【簽】', '').trim();
                    draftText = parts[1].trim();
                } else {
                    // 若 AI 沒有乖乖用標籤，就直接顯示整段
                    signText = aiText;
                }
                
                html = `
                    <div class="doc-title">【 簽 】</div>
                    <div class="document-box">${signText}</div>
                    <br>
                    <div class="doc-title">【 函 稿 】</div>
                    <div class="document-box">${draftText}</div>
                `;
            } else {
                // 如果是以稿代簽，只顯示函稿
                let draftText = aiText.replace('【函稿】', '').trim();
                html = `
                    <div class="doc-title">【 函 稿 （以稿代簽）】</div>
                    <div class="document-box">${draftText}</div>
                `;
            }
            
            document.getElementById('documentContainer').innerHTML = html;
        } catch (e) {
            alert("生成失敗: " + e.message);
        }
    }
</script>
</body>
</html>
<script>
(function() {
    // 儲存搜尋結果的全域狀態
    let searchResults = [];
    let currentMatchIndex = -1;
    let replyColumnIndex = -1;

    // 1. 在「陳情內容」下方動態插入「查詢表單資料庫」的按鈕與狀態提示
    const contentArea = document.getElementById('content');
    if (contentArea) {
        const searchBtnGroup = document.createElement('div');
        searchBtnGroup.style.cssText = "margin-top: 8px; display: flex; flex-direction: column; gap: 8px;";
        searchBtnGroup.innerHTML = `
            <div style="display: flex; gap: 10px; align-items: center;">
                <button type="button" id="btnSearchSheet" style="flex: none; width: auto; padding: 6px 15px; font-size: 13px; background-color: #4a5568; border-radius: 4px; color: white; cursor: pointer;">
                    🔍 查詢雲端表單前案
                </button>
                <span id="sheetSearchStatus" style="font-size: 13px; color: #718096;">輸入陳情內容後，可點擊按鈕比對雲端歷史回覆</span>
            </div>
            <div id="matchNavPanel" style="display: none; align-items: center; gap: 10px; background: #edf2f7; padding: 8px 12px; border-radius: 4px; font-size: 13px;">
                <span id="matchCountInfo" style="font-weight: bold; color: #2d3748;"></span>
                <button type="button" id="btnPrevMatch" style="width:auto; padding: 3px 10px; font-size: 12px; background-color: #cbd5e0; color: #333; border-radius: 3px;">⬅️ 上一件</button>
                <button type="button" id="btnNextMatch" style="width:auto; padding: 3px 10px; font-size: 12px; background-color: #cbd5e0; color: #333; border-radius: 3px;">下一件 ➡️</button>
            </div>
        `;
        contentArea.parentNode.insertBefore(searchBtnGroup, contentArea.nextSibling);
    }

    // 2. CSV 文字解析核心函數
    function parseCSV(text) {
        let lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') lines.push(row);
        return lines;
    }

    // 更新目前選中案件的內容到網頁上
    function displayCurrentMatch() {
        const summaryTextarea = document.getElementById('summary');
        const countInfo = document.getElementById('matchCountInfo');
        
        if (searchResults.length === 0 || currentMatchIndex === -1) return;

        const targetRow = searchResults[currentMatchIndex].row;
        const matchedReply = targetRow[replyColumnIndex] || "";

        // 填入回覆大要
        summaryTextarea.value = matchedReply.trim();
        
        // 更新計數顯示 (例如: [第 1 / 3 筆符合案件])
        countInfo.innerHTML = `🎯 找到相似前案：第 ${currentMatchIndex + 1} / ${searchResults.length} 筆`;

        // 讓回覆大要輸入框閃爍提示同仁
        summaryTextarea.style.backgroundColor = "#f0fff4";
        setTimeout(() => { summaryTextarea.style.backgroundColor = "#fff"; }, 800);
    }

    // 3. 綁定查詢按鈕事件
    document.getElementById('btnSearchSheet').addEventListener('click', async function() {
        const contentVal = document.getElementById('content').value.trim();
        const statusSpan = document.getElementById('sheetSearchStatus');
        const navPanel = document.getElementById('matchNavPanel');

        if (!contentVal) {
            alert("請先輸入「陳情內容」再進行雲端比對查詢。");
            return;
        }

        // 初始化狀態
        searchResults = [];
        currentMatchIndex = -1;
        navPanel.style.display = "none";

        statusSpan.innerHTML = "⏳ 正在連線至 Google 試算表資料庫...";
        statusSpan.style.color = "#2b6cb0";

        const origUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLk6B_ohYu7eLDVdmrrfInHhiKrl5Sp3-8dSLJyQ2gXMDKvKDOBs0oy-vShnMGhzRGeUHl6TTd7Wkh/pubhtml";
        const fetchUrl = origUrl.replace('/pubhtml', '/pub?output=csv');

        try {
            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error("無法讀取 Google 表單網頁");
            const csvText = await response.text();
            const rows = parseCSV(csvText);

            if (rows.length <= 1) {
                statusSpan.innerHTML = "❌ 雲端表單目前沒有任何資料。";
                statusSpan.style.color = "#e53e3e";
                return;
            }

            const headers = rows[0];
            let contentIdx = -1;
            replyColumnIndex = -1; // 賦值給全域變數

            for (let i = 0; i < headers.length; i++) {
                const headerText = headers[i].trim();
                if (headerText.includes("陳情") || headerText.includes("訴求") || headerText.includes("問題")) contentIdx = i;
                if (headerText.includes("回覆") || headerText.includes("答辯") || headerText.includes("擬辦") || headerText.includes("結論")) replyColumnIndex = i;
            }

            if (contentIdx === -1) contentIdx = 1;
            if (replyColumnIndex === -1) replyColumnIndex = headers.length > 2 ? 2 : 1;

            // 搜集所有符合門檻的資料
            for (let r = 1; r < rows.length; r++) {
                const cellContent = rows[r][contentIdx] || "";
                if (!cellContent.trim()) continue;

                let matchScore = 0;
                for (let k = 0; k < contentVal.length - 1; k++) {
                    const keyword = contentVal.substr(k, 2);
                    if (cellContent.includes(keyword)) matchScore++;
                }

                // 只要分數大於 3 分，就視為候選案件
                if (matchScore > 3) {
                    searchResults.push({ score: matchScore, row: rows[r] });
                }
            }

            // 依據匹配分數由高到低排序
            searchResults.sort((a, b) => b.score - a.score);

            if (searchResults.length > 0) {
                currentMatchIndex = 0;
                statusSpan.innerHTML = `已擷取最相似的前案。如非所需，請點擊下方按鈕切換其他案件。`;
                statusSpan.style.color = "#2f855a";
                
                // 顯示切換面板
                navPanel.style.display = "flex";
                displayCurrentMatch();
            } else {
                statusSpan.innerHTML = `🔍 比對完成：雲端資料庫中「未發現」相同或高度相似的前案紀錄。`;
                statusSpan.style.color = "#4a5568";
            }

        } catch (error) {
            console.error("讀取 Google 表單失敗:", error);
            statusSpan.innerHTML = `❌ 連線失敗，請確認該表單是否已設定「發佈於網路」。`;
            statusSpan.style.color = "#e53e3e";
        }
    });

    // 4. 綁定「上一件」與「下一件」按鈕事件
    document.getElementById('btnPrevMatch').addEventListener('click', function() {
        if (searchResults.length <= 1) return;
        // 循環切換：如果小於 0 就回到最後一件
        currentMatchIndex = (currentMatchIndex - 1 + searchResults.length) % searchResults.length;
        displayCurrentMatch();
    });

    document.getElementById('btnNextMatch').addEventListener('click', function() {
        if (searchResults.length <= 1) return;
        // 循環切換：如果超出最大值就回到第一件
        currentMatchIndex = (currentMatchIndex + 1) % searchResults.length;
        displayCurrentMatch();
    });
})();
