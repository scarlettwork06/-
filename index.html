<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民陳情案「簽、函稿」自動生成器</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1a365d;
            border-bottom: 2px solid #2b6cb0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #2d3748;
        }
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .required::after {
            content: " *";
            color: #e53e3e;
        }
        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-sign-draft {
            background-color: #2b6cb0;
        }
        .btn-sign-draft:hover {
            background-color: #2c5282;
        }
        .btn-replace {
            background-color: #319795;
        }
        .btn-replace:hover {
            background-color: #234e52;
        }
        .output-section {
            margin-top: 30px;
            display: none;
        }
        .document-box {
            background: #fff;
            border: 2px solid #333;
            padding: 40px;
            margin-bottom: 30px;
            font-family: "標楷體", "DFKai-SB", serif;
            font-size: 18px;
            line-height: 1.8;
            position: relative;
            white-space: pre-wrap;
        }
        .doc-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .ai-badge {
            background-color: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽、函稿」生成器</h2>
    
    <!-- 1. 陳情人 -->
    <div class="form-group">
        <label for="petitioner">陳情人 <span style="font-weight:normal; color:#718096;">(選填，留空則顯示「某民眾」)</span></label>
        <input type="text" id="petitioner" placeholder="請輸入陳情人姓名或名稱">
    </div>

    <!-- 2. 來文時間 -->
    <div class="form-group">
        <label for="incomingDate">來文時間</label>
        <input type="date" id="incomingDate">
    </div>

    <!-- 3. 陳情內容與回覆大要 -->
    <div class="form-group">
        <label for="content" class="required">陳情內容</label>
        <textarea id="content" placeholder="請輸入陳情人訴求、痛點或主要陳情內容..."></textarea>
    </div>

        <div class="form-group">
        <label for="summary">回覆大要 <span style="font-weight:normal; color:#718096;">(選填，由 Gemini AI 自動優化/擬稿)</span></label>
        <textarea id="summary" placeholder="留空：由 AI 依陳情內容從無到有生成。&#10;簡要填寫：例如輸入「不符規定拒絕」，由 AI 自動潤飾擴充。"></textarea>
    </div>

    <div style="margin-top: -10px; margin-bottom: 25px; font-size: 13px; color: #718096; display: flex; gap: 15px;">
        <span>🔍 系統已內嵌：<a href="https://law.moj.gov.tw/" target="_blank" style="color: #2b6cb0; text-decoration: none; font-weight: bold;">全國法規資料庫</a> 檢索提示</span>
        <span>📘 遵照：<a href="https://www.ey.gov.tw/" target="_blank" style="color: #2b6cb0; text-decoration: none; font-weight: bold;">行政院文書處理手冊</a> 擬稿標準（簡淺明確/客觀委婉）</span>
    </div>
    <div class="btn-group">


    <!-- 4. 決行方式按鍵 -->
    <div class="btn-group">
        <button class="btn-sign-draft" onclick="generateDoc('併陳')">📝 簽稿併陳</button>
        <button class="btn-replace" onclick="generateDoc('代簽')">🚀 以稿代簽</button>
    </div>

    <!-- 輸出區塊 -->
    <div id="outputSection" class="output-section">
        <div id="aiNotify" class="ai-badge"></div>
        <div id="documentContainer"></div>
    </div>
</div>

<script>
    // 網頁開啟時自動填入今天日期（2026年6月28日邏輯）
    window.onload = function() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('incomingDate').value = `${yyyy}-${mm}-${dd}`;
    };

    // 格式化日期為公文用的民國日期
    function formatChineseDate(dateString) {
        if (!dateString) {
            return "____年__月__日";
        }
        const date = new Date(dateString);
        const rocYear = date.getFullYear() - 1911;
        const month = date.getMonth() + 1;
        const day = date.getDate();
        return `中華民國 ${rocYear} 年 ${month} 月 ${day} 日`;
    }

    // 模擬 Gemini AI 的處理邏輯（實際應用時此處改為 fetch API）
    function simulateGeminiAI(content, summary) {
        // 狀況 A：回覆大要完全留空 -> 從無到有生成
        if (!summary.trim()) {
            return {
                text: `經查本案陳情訴求，本府向來重視民眾權益，惟經主管機關審慎盤點與現行法規實務，其所請事項依規定尚有未合。本機關將持續秉持依法行政原則，積極關注後續中央修法趨勢，並適時提供必要之法規輔導與協助。`,
                status: "✨ 【Gemini AI 智能生成】偵測到回覆大要留空，已根據陳情內容「從無到有」為您擬定一段專業公文文體。"
            };
        }
        
        // 狀況 B：只有簡要填寫（例如：不符規定拒絕）-> 潤飾、擴充
        if (summary.trim().length < 15) {
            return {
                text: `針對陳情人所述事項，經本機關綜合衡酌相關法令要件，因與現行規範之具體法定程序與實體要件尚未能全然相符，衡諸依法行政原則，本案歉難據以辦理。造成不便，誠請見諒。本機關未來仍將持續優化行政效能，以維護公眾權益。`,
                status: `✍️ 【Gemini AI 智能潤飾】已將您的簡短重點「${summary}」擴充並重塑為客觀、委婉且符合政府機關標準之公務用語。`
            };
        }

        // 狀況 C：使用者已經寫得很完整 -> 略微修飾
        return {
            text: summary,
            status: "✅ 已直接採用您填寫的專業回覆大要導入公文稿中。"
        };
    }

    // 主生成程式
    function generateDoc(type) {
        const petitioner = document.getElementById('petitioner').value.trim() || "某民眾";
        const incomingDateStr = document.getElementById('incomingDate').value;
        const content = document.getElementById('content').value.trim();
        const summaryInput = document.getElementById('summary').value;

        if (!content) {
            alert("請填寫「陳情內容」後再行生成！");
            return;
        }

        const formattedDate = formatChineseDate(incomingDateStr);
        
        // 呼叫 AI 模擬器
        const aiResult = simulateGeminiAI(content, summaryInput);
        
        // 顯示 AI 處理狀態提示
        const aiNotify = document.getElementById('aiNotify');
        aiNotify.innerHTML = aiResult.status;

        const container = document.getElementById('documentContainer');
        container.innerHTML = ""; // 清空舊資料

        // 結構化文字定義
        let signHtml = `
<div class="document-box">
<div class="doc-title">簽</div>
<b>主旨：</b>有關${petitioner}於${formattedDate}反映「${content.substring(0,20)}...」陳情案，擬具復函如附件，提請 鑒核。

<b>說明：</b>
一、依據 ${formattedDate} 移文及陳情人陳情內容辦理。
二、本案核心訴求為：「${content}」。
三、本案管轄及法規研析：
    ${aiResult.text}

<b>擬辦：</b>
一、本案文稿擬經奉核後，即行文復知陳情人。
二、文存查。
</div>`;

        let draftHtml = `
<div class="document-box">
<div class="doc-title">（機關全銜） 函稿</div>
發文日期：${formattedDate}
發文字號：

受文者：${petitioner}

<b>主旨：</b>關於您反映之陳情事項，本機關復如說明，請 查照。

<b>說明：</b>
一、依據您${formattedDate}之陳情意見辦理。
二、復文大要：
    ${aiResult.text}
三、感謝您對公共事務的關心，如對本案仍有法規適用之疑義，歡迎逕洽本機關承辦人。
</div>`;

        // 根據使用者按鍵，組合不同的顯示畫面
        if (type === '併陳') {
            container.innerHTML = `<h3 style="color:#2b6cb0;">【簽稿併陳模式】</h3>` + signHtml + draftHtml;
        } else if (type === '代簽') {
            container.innerHTML = `<h3 style="color:#319795;">【以稿代簽模式】</h3>` + draftHtml;
        }

        // 秀出結果區塊並滾動到該處
        document.getElementById('outputSection').style.display = 'block';
        window.scrollTo({ top: document.getElementById('outputSection').offsetTop, behavior: 'smooth' });
    }
</script>

</body>
</html>
