<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>人民陳情案「簽與函稿」AI 智慧生成器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f5f7fa; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        
        /* 按鈕切換區 */
        .mode-container { display: flex; justify-content: center; margin: 20px 0; background: #eee; padding: 5px; border-radius: 25px; }
        .mode-btn { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 20px; font-weight: bold; color: #555; transition: 0.3s; }
        .mode-btn.active { background-color: #2c3e50; color: #fff; }
        
        .btn-container { text-align: center; }
        .submit-btn { padding: 12px 40px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        
        .output-section { margin-top: 30px; display: none; }
        .output-box { padding: 20px; border: 1px dashed #2980b9; background: #fdfefe; white-space: pre-wrap; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽與函稿」AI 生成器</h2>
    
    <div class="form-group">
        <label>1. 陳情人：</label>
        <input type="text" id="petitioner" placeholder="例：張先生">
    </div>

    <div class="form-group">
        <label>2. 陳情內容 (必填)：</label>
        <textarea id="content" rows="4"></textarea>
    </div>

    <div class="form-group">
        <label>3. 回覆大要 (留空則由 AI 生成)：</label>
        <textarea id="summary" rows="4"></textarea>
    </div>

    <label>4. 選擇辦理方式：</label>
    <div class="mode-container">
        <div class="mode-btn active" id="btnBoth" onclick="setMode('both')">簽稿併陳</div>
        <div class="mode-btn" id="btnDraftOnly" onclick="setMode('draftOnly')">以稿代簽</div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" onclick="generateDraft()">一鍵生成公文稿件</button>
    </div>

    <div id="outputSection" class="output-section">
        <div id="signBlock">
            <div style="font-weight:bold">【簽呈範本】</div>
            <div id="signOutput" class="output-box"></div>
        </div>
        <div style="font-weight:bold">【函稿範本】</div>
        <div id="letterOutput" class="output-box"></div>
    </div>
</div>

<script>
    const GEMINI_API_KEY = "請在此處填入您的API_KEY"; 
    let currentMode = 'both';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnBoth').classList.toggle('active', mode === 'both');
        document.getElementById('btnDraftOnly').classList.toggle('active', mode === 'draftOnly');
    }

    async function generateDraft() {
        let petitioner = document.getElementById('petitioner').value.trim() || "陳情人";
        let content = document.getElementById('content').value.trim();
        let summary = document.getElementById('summary').value.trim();

        if (!content) { alert("請填寫陳情內容！"); return; }

        // 若 summary 為空則呼叫 AI
        if (!summary) {
            summary = await fetchGeminiReply(content);
        }

        // 渲染結果
        const signBlock = document.getElementById('signBlock');
        const signOutput = document.getElementById('signOutput');
        const letterOutput = document.getElementById('letterOutput');

        if (currentMode === 'both') {
            signBlock.style.display = 'block';
            signOutput.textContent = `主旨：關於 ${petitioner} 陳情案，擬辦意見如說明，請核示。\n\n說明：\n一、依據 ${petitioner} 意見辦理。\n二、陳情內容：${content}\n三、擬辦意見：${summary}\n四、檢陳回覆函稿乙份。\n\n擬辦：奉核後，稿隨文發。`;
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端陳情事項，復如說明，請查照。\n\n說明：\n一、復 台端陳情內容。\n二、說明：${summary}`;
        } else {
            signBlock.style.display = 'none';
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端陳情事項，復如說明，請查照。\n\n說明：\n一、復 台端陳情內容。\n二、說明：${summary}\n\n（本案依規定採「以稿代簽」辦理，經 貴長官核可後逕行發文）`;
        }

        document.getElementById('outputSection').style.display = 'block';
    }

    async function fetchGeminiReply(content) {
        if (GEMINI_API_KEY.includes("API_KEY")) return "（請手動填寫回覆大要，或至程式碼中設定 API Key 以啟用 AI 輔助）";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "請針對此陳情內容撰寫公務機關回覆要點：" + content }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            return "AI 生成失敗，請手動輸入。";
        }
    }
</script>
</body>
</html>
