<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>人民陳情案「簽與函稿」AI 智慧生成器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f5f7fa; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        /* 辦理方式切換鍵樣式 */
        .mode-container { display: flex; justify-content: center; margin: 20px 0; background: #eee; padding: 5px; border-radius: 25px; }
        .mode-btn { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 20px; font-weight: bold; color: #555; transition: 0.3s; }
        .mode-btn.active { background-color: #2c3e50; color: #fff; }
        
        .btn-container { text-align: center; margin-top: 25px; }
        .submit-btn { padding: 14px 40px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .submit-btn:hover { background-color: #3498db; }
        
        .output-section { margin-top: 30px; display: none; }
        .output-box { padding: 20px; border: 1px dashed #2980b9; background: #fdfefe; white-space: pre-wrap; margin-bottom: 20px; font-size: 15px; border-radius: 4px; }
        .loading { display: none; text-align: center; color: #2980b9; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽與函稿」生成器</h2>
    
    <div class="form-group">
        <label>1. 陳情人 (選填)：</label>
        <input type="text" id="petitioner" placeholder="例：張先生（留空則預設為陳情人）">
    </div>

    <div class="form-group">
        <label>2. 陳情內容 (必填)：</label>
        <textarea id="content" rows="4" placeholder="請輸入陳情核心诉求..."></textarea>
    </div>

    <div class="form-group">
        <label>3. 回覆大要 (選填，留空將啟動 Gemini AI 模擬擬答)：</label>
        <textarea id="summary" rows="4" placeholder="若留空，且下方有設定 API Key，將自動由 AI 撰寫回覆要點..."></textarea>
    </div>

    <label>4. 請選擇公文辦理方式：</label>
    <div class="mode-container">
        <div class="mode-btn active" id="btnBoth">簽稿併陳</div>
        <div class="mode-btn" id="idDraftOnly">以稿代簽</div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="submitBtn">一鍵生成公文稿件</button>
    </div>
    
    <div class="loading" id="loadingText">⏳ AI 正在研議陳情內容並撰寫公文擬答，請稍候...</div>

    <div id="outputSection" class="output-section">
        <div id="signBlock">
            <div style="font-weight:bold; margin-bottom:5px; color:#2c3e50;">【簽呈範本】</div>
            <div id="signOutput" class="output-box"></div>
        </div>
        <div style="font-weight:bold; margin-bottom:5px; color:#2c3e50;">【函稿範本】</div>
        <div id="letterOutput" class="output-box"></div>
    </div>
</div>

<script>
    // ⚠️ 如果要用 AI 功能，請把您的 Key 貼在下面兩個引號中間。如果沒貼，留空也會正常輸出基本稿件！
    const GEMINI_API_KEY = "請在此處填入您的Gemini_API_KEY"; 
    
    let currentMode = 'both'; // 預設模式為簽稿併陳

    // 綁定辦理方式按鈕的點擊事件
    document.getElementById('btnBoth').addEventListener('click', function() {
        currentMode = 'both';
        this.classList.add('active');
        document.getElementById('idDraftOnly').classList.remove('active');
    });

    document.getElementById('idDraftOnly').addEventListener('click', function() {
        currentMode = 'draftOnly';
        this.classList.add('active');
        document.getElementById('btnBoth').classList.remove('active');
    });

    // 綁定一鍵生成按鈕
    document.getElementById('submitBtn').addEventListener('click', async function() {
        let petitioner = document.getElementById('petitioner').value.trim() || "陳情人";
        let content = document.getElementById('content').value.trim();
        let summary = document.getElementById('summary').value.trim();

        // 1. 檢查必填
        if (!content) { 
            alert("請輸入「陳情內容」！"); 
            return; 
        }

        // 2. 判斷回覆大要是否留空，且檢查是否啟用 AI
        if (!summary) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("請在此處填入") || GEMINI_API_KEY === "") {
                // 如果沒有填寫 Key，直接給預設提示文字，跳過網路請求，確保絕對不會當機
                summary = "（回覆大要留空，請於此處手動補充回覆大要與法規依據）";
            } else {
                // 如果有填寫 Key，才執行 AI 呼叫
                document.getElementById('loadingText').style.display = 'block';
                document.getElementById('outputSection').style.display = 'none';
                
                try {
                    summary = await fetchGeminiReply(content);
                } catch (e) {
                    summary = "（AI 連線失敗，請手動補充回覆大要與法規依據）";
                }
                
                document.getElementById('loadingText').style.display = 'none';
            }
        }

        // 3. 渲染並產出結果
        const signBlock = document.getElementById('signBlock');
        const signOutput = document.getElementById('signOutput');
        const letterOutput = document.getElementById('letterOutput');

        if (currentMode === 'both') {
            signBlock.style.display = 'block';
            signOutput.textContent = `主旨：關於 ${petitioner} 陳情案，擬辦意見如說明，請 核示。\n\n說明：\n一、依據 ${petitioner} 意見辦理。\n二、本案陳情核心內容略以：${content}\n三、經查與研議，本案擬擬答復要點如下：\n    ${summary}\n四、檢陳回覆函稿乙份。\n\n擬辦：奉核後，稿隨文發。`;
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端陳情事項，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${summary}`;
        } else {
            signBlock.style.display = 'none';
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：有關 台端陳情事項，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${summary}\n\n正本：${petitioner}\n副本：\n\n（本案依規定採「以稿代簽」辦理，經 貴長官核可後逕行發文）`;
        }

        // 顯示結果區塊
        document.getElementById('outputSection').style.display = 'block';
        document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
    });

    // 呼叫 Gemini 網路請求
    async function fetchGeminiReply(content) {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                contents: [{ 
                    parts: [{ 
                        text: "你現在是政府機關公文專家，請針對此陳情訴求，直接寫出一段150字內客觀公務語氣的回覆說明重點，不要包含主旨或問候語：" + content 
                    }] 
                }] 
            })
        });
        if (!response.ok) throw new Error("API 錯誤");
        const data = await response.json();
        return data.candidates[0].content.parts[0].text.trim();
    }
</script>
</body>
</html>
