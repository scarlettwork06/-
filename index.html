<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>人民陳情案「簽與函稿」智慧生成器 v8.1 免金鑰版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f5f7fa; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 15px; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
        label .optional { font-size: 0.85em; color: #7f8c8d; font-weight: normal; }
        label .required { font-size: 0.85em; color: #e74c3c; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; }
        
        .mode-container { display: flex; justify-content: center; margin: 20px 0; background: #eee; padding: 5px; border-radius: 25px; }
        .mode-btn { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 20px; font-weight: bold; color: #555; transition: 0.3s; }
        .mode-btn.active { background-color: #2c3e50; color: #fff; }
        
        .btn-container { text-align: center; margin-top: 25px; }
        .submit-btn { padding: 14px 40px; background-color: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .submit-btn:hover { background-color: #4caf50; }
        .submit-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .output-section { margin-top: 30px; display: none; }
        .output-box { padding: 20px; border: 1px dashed #2e7d32; background: #fdfefe; white-space: pre-wrap; margin-bottom: 25px; font-size: 15px; border-radius: 4px; line-height: 1.8; font-family: "Microsoft JhengHei", Courier, monospace; }
        .output-title { font-weight: bold; color: #2c3e50; margin-bottom: 8px; font-size: 1.1em; display: flex; align-items: center; }
        .ai-badge { background-color: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: normal; margin-left: 10px; border: 1px solid #2e7d32; }
        .loading { display: none; text-align: center; color: #2e7d32; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>人民陳情案「簽與函稿」智慧生成器 (免金鑰雲端版)</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label for="petitioner">1. 陳情人 <span class="optional">（選填）</span>：</label>
            <input type="text" id="petitioner" placeholder="例：張先生">
        </div>
        <div class="form-group">
            <label for="receiveDate">2. 來文時間 <span class="optional">（選填）</span>：</label>
            <input type="date" id="receiveDate">
        </div>
    </div>

    <div class="form-group">
        <label for="subject">3. 陳情主旨 <span class="optional">（選填，如有輸入將主動融入公文主旨與 AI 內文中）</span>：</label>
        <input type="text" id="subject" placeholder="例：反映某路段路燈故障損壞、反映程序不當">
    </div>

    <div class="form-group">
        <label for="content">4. 陳情內容 <span class="required">（必填）</span>：</label>
        <textarea id="content" rows="4" placeholder="請輸入民眾陳情之核心具體訴求..."></textarea>
    </div>

    <div class="form-group">
        <label for="summary">5. 回覆大要/擬答重點 <span class="optional">（完全免填金鑰，一律啟動免費雲端 AI 優化）</span>：</label>
        <textarea id="summary" rows="4" placeholder="【選填】若留空則由 AI 從無到有擬稿；若簡答則由 AI 深度擴充。"></textarea>
    </div>

    <label>6. 請選擇公文辦理方式：</label>
    <div class="mode-container">
        <div class="mode-btn active" id="btnBoth" onclick="changeMode('both')">簽稿併陳</div>
        <div class="mode-btn" id="idDraftOnly" onclick="changeMode('draftOnly')">以稿代簽</div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="submitBtn" onclick="startGeneration()">一鍵生成公文稿件</button>
    </div>
    
    <div class="loading" id="loadingText">⏳ 免費 AI 正在線上進行深度公文潤飾與擬稿，請稍候...</div>

    <div id="outputSection" class="output-section">
        <div id="signBlock">
            <div class="output-title">【簽呈範本】<span id="aiSignBadge"></span></div>
            <div id="signOutput" class="output-box"></div>
        </div>
        <div class="output-title">【函稿範本】<span id="aiLetterBadge"></span></div>
        <div id="letterOutput" class="output-box"></div>
    </div>
</div>

<script>
    let currentMode = 'both'; 

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('receiveDate').value = today;
    };

    function changeMode(mode) {
        currentMode = mode;
        if (mode === 'both') {
            document.getElementById('btnBoth').className = 'mode-btn active';
            document.getElementById('idDraftOnly').className = 'mode-btn';
        } else {
            document.getElementById('idDraftOnly').className = 'mode-btn active';
            document.getElementById('btnBoth').className = 'mode-btn';
        }
    }

    async function startGeneration() {
        let petitioner = document.getElementById('petitioner').value.trim() || "陳情人";
        let subject = document.getElementById('subject').value.trim(); // 🛠️ 修正：確實抓取主旨欄位值
        let content = document.getElementById('content').value.trim();
        let summary = document.getElementById('summary').value.trim();
        let receiveDateRaw = document.getElementById('receiveDate').value;
        
        if (!content) { 
            alert("「陳情內容」為必填項目。"); 
            return; 
        }

        let dateString = "____年__月__日";
        if (receiveDateRaw) {
            const dateParts = receiveDateRaw.split('-');
            const year = parseInt(dateParts[0]) - 1911;
            const month = parseInt(dateParts[1]);
            const day = parseInt(dateParts[2]);
            dateString = `民國 ${year} 年 ${month} 月 ${day} 日`;
        }

        let isAiUsed = true;
        let finalSummary = summary;

        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('outputSection').style.display = 'none';
        document.getElementById('submitBtn').disabled = true;
        
        try {
            finalSummary = await callFreeAI(content, summary, subject);
        } catch (e) {
            console.error(e);
            finalSummary = summary ? `【免費線路堵塞，以下為原重點】：\n${summary}` : "（免費 AI 線路繁忙，請稍後再試，或手動補充回覆大要）";
            isAiUsed = false;
        }
        
        document.getElementById('loadingText').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;

        const badgeHtml = isAiUsed ? '<span class="ai-badge">免費雲端 AI 智慧公文擬答</span>' : '';
        document.getElementById('aiSignBadge').innerHTML = badgeHtml;
        document.getElementById('aiLetterBadge').innerHTML = badgeHtml;

        // 動態組合公文結構主旨
        let signSubjectText = `關於 ${petitioner} 於 ${dateString} 陳情案`;
        let letterSubjectText = `有關 台端於 ${dateString} 陳情事項`;
        let contentIntroText = "本案陳情核心內容略以：\n    ";

        if (subject) {
            signSubjectText = `關於 ${petitioner} 於 ${dateString} 陳情「${subject}」案`;
            letterSubjectText = `有關 台端於 ${dateString} 陳情「${subject}」事項`;
            contentIntroText = `關於其陳情「${subject}」之一案，訴求核心略以：\n    `;
        }

        const signBlock = document.getElementById('signBlock');
        const signOutput = document.getElementById('signOutput');
        const letterOutput = document.getElementById('letterOutput');

        if (currentMode === 'both') {
            signBlock.style.display = 'block';
            signOutput.textContent = `主旨：${signSubjectText}，擬辦意見如說明，請 核示。\n\n說明：\n一、依據 ${petitioner} ${dateString} 陳情意見辦理。\n二、${contentIntroText}${content}\n三、經查與研議，本案擬擬答復要點如下：\n    ${finalSummary}\n四、檢陳回覆函稿乙份。\n\n擬辦：奉核後，稿隨文發。`;
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：${letterSubjectText}，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${finalSummary}`;
        } else {
            signBlock.style.display = 'none';
            letterOutput.textContent = `受文者：${petitioner}\n\n主旨：${letterSubjectText}，復如說明，請 查照。\n\n說明：\n一、復 台端陳情內容。\n二、關於旨揭陳情訴求，本會意見如下：\n    ${finalSummary}\n\n正本：${petitioner}\n副本：\n\n（本案依規定採「以稿代簽」辦理，經 貴長官核可後逕行發文）`;
        }

        document.getElementById('outputSection').style.display = 'block';
        document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function callFreeAI(content, userSummary, subject) {
        let promptText = `你現在是台灣政府機關的公文專家。現有民眾陳情案資訊如下：\n`;
